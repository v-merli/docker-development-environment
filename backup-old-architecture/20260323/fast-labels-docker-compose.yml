services:
  app:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./app:/var/www/html
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      VITE_PORT: ${VITE_PORT:-5173}
    networks:
      - proxy
      - backend

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - ../../shared/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - app
    networks:
      - proxy
      - backend

  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: ${PROJECT_NAME}-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes

  scheduler:
    image: ${PROJECT_NAME}-app
    container_name: ${PROJECT_NAME}-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    networks:
      - backend
    depends_on:
      - app
      - mysql
      - redis
    command: sh -c "while [ true ]; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"

  queue:
    image: ${PROJECT_NAME}-app
    container_name: ${PROJECT_NAME}-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    networks:
      - backend
    depends_on:
      - app
      - mysql
      - redis
    command: php artisan queue:work --tries=3

networks:
  proxy:
    external: true
  backend:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
