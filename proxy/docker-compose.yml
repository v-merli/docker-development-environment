name: phpharbor-proxy

services:
  # Reverse proxy with SSL support
  # Automatically routes traffic to project containers based on VIRTUAL_HOST
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      # SSL certificates directory (mkcert generated certificates)
      # Contains: domain.test.crt, domain.test.key, domain.test.chain.pem
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    environment:
      - DEFAULT_HOST=localhost
    labels:
      - com.github.nginx-proxy.nginx
    networks:
      - phpharbor-proxy

  # Let's Encrypt companion for automatic SSL certificates
  # Note: Not used for .test domains (they're not publicly routable)
  # Useful for staging/production environments with real domains
  # Creates empty _test_*.test directories in nginx/certs (can be ignored)
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-acme-companion
    restart: always
    depends_on:
      - nginx-proxy
    volumes:
      # Read-write access to generate Let's Encrypt certificates
      # For .test domains, mkcert certificates take priority
      - ./nginx/certs:/etc/nginx/certs:rw
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # ACME protocol data (account, challenges, certificates)
      - ./nginx/acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=dev@example.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
      # Using staging to avoid rate limits during development
      - ACME_CA_URI=https://acme-staging-v02.api.letsencrypt.org/directory
    networks:
      - phpharbor-proxy

  # Shared services (optional) - Multiple versions supported
  # Projects can use these services instead of having a dedicated one
  
  # MySQL Shared Services
  mysql-5.7-shared:
    image: mysql:5.7
    container_name: mysql-5.7-shared
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Projects will create their databases via migration
    volumes:
      - mysql_5_7_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    command: --default-authentication-plugin=mysql_native_password
    profiles:
      - shared-services

  mysql-8.0-shared:
    image: mysql:8.0
    container_name: mysql-8.0-shared
    restart: unless-stopped
    ports:
      - "${MYSQL_SHARED_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Projects will create their databases via migration
    volumes:
      - mysql_8_0_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  mysql-8.4-shared:
    image: mysql:8.4
    container_name: mysql-8.4-shared
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_AUTHENTICATION_PLUGIN: caching_sha2_password
      # Projects will create their databases via migration
    volumes:
      - mysql_8_4_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  # MariaDB Shared Services
  mariadb-11.4-shared:
    image: mariadb:11.4
    container_name: mariadb-11.4-shared
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Projects will create their databases via migration
    volumes:
      - mariadb_11_4_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  mariadb-10.11-shared:
    image: mariadb:10.11
    container_name: mariadb-10.11-shared
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Projects will create their databases via migration
    volumes:
      - mariadb_10_11_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  mariadb-10.6-shared:
    image: mariadb:10.6
    container_name: mariadb-10.6-shared
    restart: unless-stopped
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      # Projects will create their databases via migration
    volumes:
      - mariadb_10_6_shared_data:/var/lib/mysql
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  # Redis Shared Services
  redis-6-shared:
    image: redis:6-alpine
    container_name: redis-6-shared
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_6_shared_data:/data
    networks:
      - phpharbor-proxy
    command: redis-server --appendonly yes
    profiles:
      - shared-services

  redis-7-shared:
    image: redis:7-alpine
    container_name: redis-7-shared
    restart: unless-stopped
    ports:
      - "${REDIS_SHARED_PORT:-6379}:6379"
    volumes:
      - redis_7_shared_data:/data
    networks:
      - phpharbor-proxy
    command: redis-server --appendonly yes
    profiles:
      - shared-services

  # Shared PHP-FPM for each version
  # Mount all projects in /var/www/projects
  php-7.3-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-7.3-fpm-only.Dockerfile
    container_name: php-7.3-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-7.4-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-7.4-fpm-only.Dockerfile
    container_name: php-7.4-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-8.1-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-8.1-fpm-only.Dockerfile
    container_name: php-8.1-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-8.2-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-8.2-fpm-only.Dockerfile
    container_name: php-8.2-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-8.3-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-8.3-fpm-only.Dockerfile
    container_name: php-8.3-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-8.4-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-8.4-fpm-only.Dockerfile
    container_name: php-8.4-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

  php-8.5-shared:
    build:
      context: ../shared/dockerfiles
      dockerfile: php-8.5-fpm-only.Dockerfile
    container_name: php-8.5-shared
    restart: unless-stopped
    working_dir: /var/www/projects
    volumes:
      - ../projects:/var/www/projects
    networks:
      - phpharbor-proxy
    profiles:
      - shared-services

volumes:
  # Shared service volumes - consistent naming pattern
  mysql_5_7_shared_data:
    name: mysql_5_7_shared_data
  mysql_8_0_shared_data:
    name: mysql_8_0_shared_data
  mysql_8_4_shared_data:
    name: mysql_8_4_shared_data
  mariadb_11_4_shared_data:
    name: mariadb_11_4_shared_data
  mariadb_10_11_shared_data:
    name: mariadb_10_11_shared_data
  mariadb_10_6_shared_data:
    name: mariadb_10_6_shared_data
  redis_6_shared_data:
    name: redis_6_shared_data
  redis_7_shared_data:
    name: redis_7_shared_data

networks:
  phpharbor-proxy:
    name: phpharbor-proxy
    external: true
