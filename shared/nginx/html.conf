server {
    listen 80;
    server_name _;
    
    root /var/www/html;
    index index.html index.htm;

    charset utf-8;

    # Proxy headers are automatically forwarded by nginx-proxy
    # For static HTML, these headers don't affect content but are available for:
    # - SSI (Server Side Includes)
    # - Custom error pages
    # - Future server-side processing
    # The X-Forwarded-Proto, X-Forwarded-Host, X-Forwarded-Port headers
    # from nginx-proxy are preserved in $http_x_forwarded_* variables

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Disable .htaccess and other hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
