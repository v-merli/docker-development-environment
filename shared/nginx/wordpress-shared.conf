server {
    listen 80;
    server_name _;
    
    # NOTE: The path must match the one mounted in the shared PHP-FPM container
    root /var/www/projects/PROJECT_NAME_PLACEHOLDER/app;
    index index.php index.html index.htm;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # WordPress: deny access to sensitive files
    location ~* \.(htaccess|htpasswd|sql|git|svn)$ {
        deny all;
    }

    # WordPress: allow only limited PHP files
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Shared PHP-FPM (will be replaced with specific version)
        fastcgi_pass PHP_VERSION_PLACEHOLDER-shared:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        
        # Pass proxy headers to PHP for correct URL generation
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        
        # Set HTTPS param when behind SSL proxy
        fastcgi_param HTTPS $https if_not_empty;
        set $custom_https off;
        if ($http_x_forwarded_proto = "https") {
            set $custom_https on;
        }
        fastcgi_param HTTPS $custom_https;
    }

    # WordPress: cache static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
