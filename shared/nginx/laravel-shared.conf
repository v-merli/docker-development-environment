server {
    listen 80;
    server_name _;
    
    # NOTA: Il path deve corrispondere a quello montato nel container PHP-FPM condiviso
    root /var/www/projects/PROJECT_NAME_PLACEHOLDER/app/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # PHP-FPM condiviso (verrà sostituito con la versione specifica)
        fastcgi_pass PHP_VERSION_PLACEHOLDER-shared:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

