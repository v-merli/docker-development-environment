services:
  app:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./app:/var/www/html
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      # Connessione ai servizi condivisi
      DB_HOST: mysql-shared
      REDIS_HOST: redis-shared
    networks:
      - proxy

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - ../../shared/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - app
    networks:
      - proxy

  scheduler:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: mysql-shared
      REDIS_HOST: redis-shared
    networks:
      - proxy
    command: sh -c "while [ true ]; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"

  # Decommentare per abilitare il queue worker
  # queue:
  #   build:
  #     context: ../../shared/dockerfiles
  #     dockerfile: php-${PHP_VERSION}.Dockerfile
  #     args:
  #       NODE_VERSION: ${NODE_VERSION:-20}
  #   container_name: ${PROJECT_NAME}-queue
  #   restart: unless-stopped
  #   working_dir: /var/www/html
  #   volumes:
  #     - ./app:/var/www/html
  #   environment:
  #     DB_HOST: mysql-shared
  #     REDIS_HOST: redis-shared
  #   networks:
  #     - proxy
  #   command: php artisan queue:work --tries=3

networks:
  proxy:
    external: true
