# Docker Compose Unified Template
# Supporta cherry-picking granulare dei servizi
# Configurato tramite .env del progetto

services:
  # ============================================
  # APP - Development Container (SEMPRE presente)
  # PHP + Node.js per composer, artisan, npm, vite
  # ============================================
  app:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./app:/var/www/html
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      VITE_PORT: ${VITE_PORT:-5173}
      # Database configuration (dedicate or shared)
      DB_HOST: ${DB_HOST:-mysql}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      # Redis configuration (dedicated or shared)
      REDIS_HOST: ${REDIS_HOST:-redis}
    networks:
      - proxy
      - backend
    profiles:
      - app

  # ============================================
  # NGINX - Web Server (SEMPRE presente)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - ${NGINX_CONF_PATH:-../../shared/nginx/laravel.conf}:/etc/nginx/conf.d/default.conf
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - app
    networks:
      - proxy
      - backend
    profiles:
      - app

  # ============================================
  # MYSQL - Database dedicato (opzionale)
  # Attivo solo se USE_DEDICATED_MYSQL=true
  # ============================================
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: ${PROJECT_NAME}-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    command: --default-authentication-plugin=mysql_native_password
    profiles:
      - mysql-dedicated

  # ============================================
  # REDIS - Cache dedicato (opzionale)
  # Attivo solo se USE_DEDICATED_REDIS=true
  # ============================================
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes
    profiles:
      - redis-dedicated

  # ============================================
  # SCHEDULER - Laravel Scheduler
  # Usa immagine app (default) o php-shared
  # ============================================
  scheduler:
    image: ${SCHEDULER_IMAGE:-${PROJECT_NAME}-app}
    container_name: ${PROJECT_NAME}-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
    networks:
      - backend
      - proxy
    command: sh -c "until [ -f artisan ]; do echo 'Waiting for Laravel installation...' && sleep 10; done && while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    profiles:
      - scheduler

  # ============================================
  # QUEUE - Laravel Queue Worker
  # Usa immagine app (default) o php-shared
  # ============================================
  queue:
    image: ${QUEUE_IMAGE:-${PROJECT_NAME}-app}
    container_name: ${PROJECT_NAME}-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
    networks:
      - backend
      - proxy
    command: sh -c "until [ -f artisan ]; do echo 'Waiting for Laravel installation...' && sleep 10; done && php artisan queue:work --tries=3"
    profiles:
      - queue

networks:
  proxy:
    external: true
  backend:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
