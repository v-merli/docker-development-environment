# Docker Compose Unified Template
# Supports granular cherry-picking of services
# Configured via project .env

services:
  # ============================================
  # APP - Development Container (ALWAYS present)
  # PHP + Node.js for composer, artisan, npm, vite
  # ============================================
  app:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./app:/var/www/html
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      VITE_PORT: ${VITE_PORT:-5173}
      # Note: DB_* and REDIS_* variables are NOT set here
      # They should be configured in the Laravel .env file instead
      # This allows full control of database/cache configuration in the app
    networks:
      - phpharbor-proxy
      - backend
    profiles:
      - app

  # ============================================
  # NGINX - Web Server (SEMPRE presente)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      - ${NGINX_CONF_PATH:-../../shared/nginx/laravel.conf}:/etc/nginx/conf.d/default.conf
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - app
    networks:
      - phpharbor-proxy
      - backend
    profiles:
      - app

  # ============================================
  # MYSQL - Dedicated database (optional)
  # Active only if USE_DEDICATED_MYSQL=true
  # ============================================
  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    container_name: ${PROJECT_NAME}-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    command: --default-authentication-plugin=mysql_native_password
    profiles:
      - mysql-dedicated

  # ============================================
  # REDIS - Dedicated cache (optional)
  # Active only if USE_DEDICATED_REDIS=true
  # ============================================
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes
    profiles:
      - redis-dedicated

  # ============================================
  # SCHEDULER - Laravel Scheduler
  # Uses app image (default) or php-shared
  # ============================================
  scheduler:
    image: ${SCHEDULER_IMAGE:-${PROJECT_NAME}-app}
    container_name: ${PROJECT_NAME}-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      # Only set if explicitly defined in project .env (defaults to empty)
      # This allows Laravel .env to control database configuration
      DB_HOST: ${DB_HOST:-}
      REDIS_HOST: ${REDIS_HOST:-}
    networks:
      - backend
      - proxy
    command: sh -c "until [ -f artisan ] && [ -f vendor/autoload.php ]; do echo 'Waiting for Laravel installation...' && sleep 2; done && while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    profiles:
      - scheduler

  # ============================================
  # QUEUE - Laravel Queue Worker
  # Uses app image (default) or php-shared
  # ============================================
  queue:
    image: ${QUEUE_IMAGE:-${PROJECT_NAME}-app}
    container_name: ${PROJECT_NAME}-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      # Only set if explicitly defined in project .env (defaults to empty)
      # This allows Laravel .env to control database configuration
      DB_HOST: ${DB_HOST:-}
      REDIS_HOST: ${REDIS_HOST:-}
    networks:
      - backend
      - phpharbor-proxy
    command: sh -c "until [ -f artisan ] && [ -f vendor/autoload.php ]; do echo 'Waiting for Laravel installation...' && sleep 2; done && php artisan queue:work --tries=3"
    profiles:
      - queue

networks:
  phpharbor-proxy:
    external: true
  backend:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
