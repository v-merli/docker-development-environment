services:
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    volumes:
      - ./app:/var/www/projects/${PROJECT_NAME}/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - proxy

  # Laravel Scheduler (esegue artisan schedule:run ogni minuto)
  scheduler:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-scheduler
    restart: unless-stopped
    working_dir: /var/www/projects/${PROJECT_NAME}/app
    volumes:
      - ./app:/var/www/projects/${PROJECT_NAME}/app
    networks:
      - proxy
    command: sh -c "while [ true ]; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"

  # Laravel Queue Worker (decommenta se usi le code)
  queue:
    build:
      context: ../../shared/dockerfiles
      dockerfile: php-${PHP_VERSION}.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}-queue
    restart: unless-stopped
    working_dir: /var/www/projects/${PROJECT_NAME}/app
    volumes:
      - ./app:/var/www/projects/${PROJECT_NAME}/app
    networks:
      - proxy
    command: php artisan queue:work --tries=3

networks:
  proxy:
    external: true
